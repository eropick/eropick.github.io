<!DOCTYPE html>
<html>
    <head lang="ko">
        <meta charset="UTF-8">
        <title>My Playlist</title>
        <script>
            //유튜브 Iframe 기본 포맷
            var YtInfo = {
                logo : "http://wiki.hash.kr/images/9/97/%EC%9C%A0%ED%8A%9C%EB%B8%8C_%EB%A1%9C%EA%B3%A0.png",
                width : "100%",
                height : "400px",
                base : "https://www.youtube.com/embed/",
                title : "YouTube video player",
                frameborder : "0",
                autoplay : "autoplay=1",
                allow : "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            }
            function clearText(){
                let name = document.getElementById("musicName");
                let link = document.getElementById("musicLink");
                name.value="";
                link.value="";
            }

            //음악 검색처리 - oninput 이벤트 사용
            function searchMusic(){
                let lists = document.getElementsByTagName("li"); //리스트 가져오기
                let musicName = document.getElementById("musicName"); 
                let name = new String(musicName.value).toLowerCase(); //대소문자 구분 없게하도록
                if(musicName.value==""){ //값이 없는 경우
                    for(let i=0;i<lists.length;++i){ 
                        lists[i].hidden=false; 
                    }
                }
                else{
                    //소문자로 반환
                    for(let i=0;i<lists.length;++i){ 
                        let listName = new String(lists[i].innerHTML).toLowerCase();
                        if(listName.indexOf(name)!=-1){ //해당 이름이 존재하면
                            lists[i].hidden=false;
                        }
                        else{ //존재하지 않으면
                            lists[i].hidden=true;
                        }
                    }
                }
            }
            
            var isDelete=false; //삭제 버튼 체커

            function delMusic(btn){ //음악 삭제
                if(isDelete){ //삭제 버튼 활성화 시
                    //체크 된 음악을 삭제함
                    let playlist = document.getElementById("playlist");
                    let checkedList = getCheckedList();
                    for(let i=0;i<checkedList.length;++i){
                        playlist.removeChild(checkedList[i]);
                    }
                    //삭제 작업 시 오류 방지를 위한 플레이어 삭제
                    deletePlayer();
                    /* 기본 이미지 삽입 */
                    let sectionPlay= document.getElementById("sec_play");
                    let imgYt = document.createElement("img");  
                    imgYt.src=YtInfo.logo;
                    imgYt.alt="여기에 영상";
                    sectionPlay.appendChild(imgYt);
                    //삭제 버튼 비활성화  
                    isDelete=false; 
                    btn.value="삭제";
                }
                else{ //삭제 버튼 비활성화 되어있다면
                    isDelete=true; //활성화
                    btn.value="선택 완료";
                }
            }

            //체크된 노드 가져오기
            function getCheckedList(){
                let playlist = document.getElementById("playlist");
                let node = playlist.children; //li 목록들
                let checkedList = new Array();
                for(let i=0;i<node.length;++i){
                    if(node[i].style.color=="red") //취소 처리된 인덱스를 받아온다.
                        checkedList.push(node[i]);        
                }
                return checkedList;
            }

            function addMusic(){ //음악 추가
                let name = document.getElementById("musicName");
                let link = document.getElementById("musicLink");
                if(name.value==""){
                    alert("음악 이름을 입력해주세요!");
                }
                else{
                    if(link.value=="") //링크가 없으면 기본 값 할당
                        link.value="https://www.youtube.com/watch?v=a_k-dCgubFo";
                    let list = document.getElementById("playlist");
                    //리스트 생성
                    let newLi = document.createElement("li");
                    newLi.innerHTML=name.value; //내용으로 노래제목
                    newLi.title=link.value; //title로 link가 들어간다.
                    newLi.onclick=function(){
                        if(isDelete) //버튼 활성화 시
                            checker(this);
                        else //삭제 버튼 활성화가 안 된경우 
                            createPlayer(this); 
                    } //노래 제목 클릭 시 플레이어 생성
                    list.appendChild(newLi); 
                }
                clearText();
                searchMusic();//리스트 갱신
            }

            function checker(music){
                let cancle = music.style.textDecoration;
                if(cancle==""){ //변동값
                    music.style.textDecoration="line-through";
                    music.style.color="red";
                }
                else{ //기본값
                    music.style.textDecoration="";
                    music.style.color="";
                }
            }
            
            function deletePlayer(){ //기존에 있던 자식 삭제
                let sectionPlay=document.getElementById("sec_play");
                let childCnt = sectionPlay.childElementCount;
                let childNodes = sectionPlay.children;
                //.childNodes의 경우 빈 부분도 자식으로 처리
                for(let i=0;i<childCnt;++i){
                    sectionPlay.removeChild(childNodes[i]);
                }
            }
            
            function createPlayer(music){ 
                deletePlayer(); //기존의 플레이어가 있으면 삭제 후 새로 생성
                let vID = getVideoID(music.title);
                //iframe 생성
                let newVideo = document.createElement("iframe");
                /* 설정작업 */
                newVideo.width=YtInfo.width;
                newVideo.height=YtInfo.height;
                newVideo.src=YtInfo.base.concat(vID+"?"+YtInfo.autoplay); //소스 + 자동재생처리
                newVideo.title=YtInfo.title;
                newVideo.frameborder=YtInfo.frameborder;
                newVideo.allow=YtInfo.allow;
                //재생할 구역 노드 가져오기
                let sectionPlay=document.getElementById("sec_play");
                sectionPlay.appendChild(newVideo);
            }

            //유튜브 링크로부터 VideoID추출
            function getVideoID(link){
                let str = new String(link);
                let vID = str.split("?v=")[1]; 
                return vID;
            }

        </script>
        <style>
            body{ margin:0%; padding:0%; }
            header{
                width:100%;
                text-align: center; 
            }
            /* 리스트 레이아웃 */
            #sec_list{ 
                width:50%;
                float:left; padding-left:3px;
            }
            /* 재생 프레임 레이아웃 */
            #sec_play{
                width:48%;
                float : left; padding-left:3px;
                text-align: center;
            }
            /* 텍스트 레이아웃 */
            #sec_text{ float:left;
                width:80%; height:100%; }
            .Text{ font-size: large;
                border-radius: 5px;
                width : 100%; margin : 2px;}
            /* 버튼 레이아웃 */
            #sec_btn{ float:right;
                width:18%; height:100%; }
            .Btn{ float:left ; font-size: medium;
                margin : 1px; width : 45%; height: 55px; }
            ol>li:hover{
                /* 마우스가 올라오면 폰트색 변경 및 크기 2배로 */
                color: blue;
                font-size: 200%; 
            }
            ol>li{
                font-family: 'Trebuchet MS', Arial, sans-serif;    
                font-size: larger;
                cursor:grab;
            }
            ol{ line-height: 30px; } /*줄간격*/
        </style>
    </head>
    <body>
        <header>
            <h3>My Playlist</h3>
            <hr>
            <form>
                <section id="sec_text">
                    <input type="text" id="musicName" oninput="searchMusic()" class="Text" placeholder="음악 이름을 입력해주세요.">
                    <input type="text" id="musicLink" class="Text" placeholder="매칭할 유튜브 주소를 입력해주세요.">
                </section>
                <aside id="sec_btn">
                    <input type="button" id="addBtn" class="Btn" value="추가" onclick="addMusic()">
                    <input type="button" id="delBtn" class="Btn" value="삭제" onclick="delMusic(this)">
                </aside>
            </form>
        </header>
        <section id="sec_list">
            <ol id="playlist">
                <!--JS로 리스트 추가-->
            </ol>
        </section>
        <section id="sec_play">
            <!--기본 이미지-->
            <img id="img_yt" alt="여기에 영상" src="http://wiki.hash.kr/images/9/97/%EC%9C%A0%ED%8A%9C%EB%B8%8C_%EB%A1%9C%EA%B3%A0.png">
        </section>
    </body>
</html>
