<!DOCTYPE html>
<html>
    <head>
        <title>입출력</title>
        <script>
            function gugudan(n){
                document.write("<h3>구구단 출력</h3><hr>");
                for(let i=1;i<=9;++i){
                    document.write(n+"x"+i+"="+n*i+"<br>");
                }
            }
        </script>
    </head>
    <body>
        <script>
            var loop=true;
            do{
                let check;
                let dan = prompt("몇 단을 입력할까요?","1");
                gugudan(parseInt(dan)); 
                //왜 함수가 출력되기도 전에 
                //confirm이 호출되는가?
                if(check=confirm("그만할까요?")){
                    loop=false;
                }
            }while(loop);
        </script>
    </body>
</html>
