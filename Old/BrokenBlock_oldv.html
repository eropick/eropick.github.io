<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="CSS/game.css">
    <title>Broken Block</title>
</head>
<body>
    <h2 class="mt-3">Broken Block</h2>
        <div id="info">
            <div>Score : <span id="score">0</span></div>
            <div>Life : <span id="life">3</span>/3</div>
        </div>
    <div class="canvas">
            <canvas class="wall" id="wall"></canvas>
            <br>
            <button class="btn btn-outline-primary mt-2">play</button> <!--버튼 : 부트스트랩 디자인-->
    </div>
    <script>
        $(document).ready(function() {
            let canvas = document.getElementById("wall");
            let ctx = canvas.getContext("2d");
    
            canvas.width = 600;
            canvas.height = 800;
    
            let ballRadius = 20;
            let x = canvas.width / 2;
            let y = canvas.height - 50;
            let dx = (Math.random() * 2 - 1) * 4;
            let dy = -4;
    
            let paddleHeight = 20;
            let paddleWidth = 100;
            let paddleX = (canvas.width - paddleWidth) / 2;
    
            let rightPressed = false;
            let leftPressed = false;
    
            document.addEventListener("keydown", keyDownHandler, false);
            document.addEventListener("keyup", keyUpHandler, false);
    
            function keyDownHandler(e) {
                if (e.key === "Right" || e.key === "ArrowRight") {
                    rightPressed = true;
                }
                else if (e.key === "Left" || e.key === "ArrowLeft") {
                    leftPressed = true;
                }
            }
    
            function keyUpHandler(e) {
                if (e.key === "Right" || e.key === "ArrowRight") {
                    rightPressed = false;
                }
                else if (e.key === "Left" || e.key === "ArrowLeft") {
                    leftPressed = false;
                }
            }
    
            function drawBall() {
                ctx.beginPath();
                ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = "#007bff";
                ctx.fill();
                ctx.closePath();
            }
    
            function drawPaddle() {
                ctx.beginPath();
                ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
                ctx.fillStyle = "#007bff";
                ctx.fill();
                ctx.closePath();
            }
    
            function drawBlocks() { //그리는거 밖에 못함
                ctx.fillStyle = "#007bff";
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 7; col++) {
                        let blockX = col * (75 + 5) + 30;
                        let blockY = row * (30 + 5) + 30;
                        ctx.fillRect(blockX, blockY, 75, 30);
                    }
                }
            }
    
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawBlocks();
                drawBall();
                drawPaddle();
    
                //공이 왼쪽 또는 오른쪽 벽에 부딪히면 반대로 가도록 설정
                if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                    dx = -dx;
                }
    
                //위쪽벽
                if (y + dy < ballRadius) {
                    dy = -dy;
    
                //받침대와 충돌여부
                } else if (y + dy > canvas.height - ballRadius - paddleHeight - 10) {
                    if (x > paddleX && x < paddleX + paddleWidth) {
                        dy = -dy;
                        //만약 패들 밑 바닥에 부딪힐경우 이벤트
                    } else {
                        console.log("Game Over");
                        document.location.reload();
                    }
                }
    
                //받침대가 벽을 넘지 않도록
                if (rightPressed && paddleX < canvas.width - paddleWidth) {
                    paddleX += 7;
                } else if (leftPressed && paddleX > 0) {
                    paddleX -= 7;
                }
    
                x += dx;
                y += dy;
                requestAnimationFrame(draw);
            }
            draw();
        });
    </script>

</body>
</html>
